services:
  frontend:
    build:
      target: prod
    environment:
      - NEXT_PUBLIC_API_URL=https://api.yourdomain.com
      - NODE_ENV=production

  backend:
    build:
      target: prod
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}

volumes:
  postgres_data:
    external: true
