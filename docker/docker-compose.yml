services:
  frontend:
    build:
      context: ../
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - INTERNAL_API_URL=http://backend:4000
    networks:
      - my_network

  backend:
    build:
      context: ../
      dockerfile: docker/backend/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - database
    networks:
      - my_network

  database:
    build:
      context: ../
      dockerfile: docker/database/Dockerfile
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - my_network

  python-script:
    build:
      context: ../
      dockerfile: docker/python-script/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - database
    networks:
      - my_network

volumes:
  postgres_data:

networks:
  my_network:
    driver: bridge
